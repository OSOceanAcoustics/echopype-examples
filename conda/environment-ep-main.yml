name: echopype_examples
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - ipykernel
  - s3fs
  - geopandas
  - cartopy
  - scipy
  - numba # Helps ensure a recent version is installed
  - numpy
  - pip
  # -- holoviz --
  - jupyter_bokeh
  - datashader
  - holoviews
  - hvplot
  # -- echopype --
  # echopype and echoregions main branch contains latest changes (not in the stable release)
  - pip:
    - git+https://github.com/ctuguinay/echopype.git@regrid_mask
    - git+https://github.com/OSOceanAcoustics/echoregions.git@main